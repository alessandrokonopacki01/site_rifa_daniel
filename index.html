<!DOCTYPE html>
<html>
<head>
    <title>Minha Rifa Online</title>
    <style>
        body {
            background-color: #202024;
            color: white;
            font-family: sans-serif;
        }

        button {
            background-color: #00b37e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Rifa do Desapego</h1>
    <p>Seja bem-vindo! Escolha seu número.</p>
    
    <button onclick="mandarAviso()">Escolher números</button>

    <div id="caixa-numeros"></div>

    <script>
    function criarNumeros() {
        // Encontra a nossa caixinha invisível no site
        let caixa = document.getElementById("caixa-numeros");
        
        // Limpa a caixinha antes de colocar os números
        caixa.innerHTML = "";

        // Esse é o laço de repetição: ele vai contar de 1 até 10!
        for (let i = 1; i <= 10; i++) {
            // Cria um novo botão para o número da rifa
            caixa.innerHTML += "<button class='botao-numero'>" + i + "</button>";
        }
    }
</script>

</body>
</html>
