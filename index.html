<!DOCTYPE html>
<html>
<head>
    <title>Minha Rifa Online</title>
    <style>
        body {
            background-color: #202024;
            color: white;
            font-family: sans-serif;
        }

        button {
            background-color: #08cf23;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .botao-numero {
            background-color: #202024;
            color: #08cf23;
            border: 2px solid #08cf23;
            padding: 10px;
            margin: 5px;
            width: 45px;
            height: 45px;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Rifa do Desapego</h1>
    <p>Seja bem-vindo! Escolha seu número.</p>
    
    <button onclick="criarNumeros()">Escolher números</button>

    <div id="caixa-numeros"></div>

    <script>
    function criarNumeros() { 
        let caixa = document.getElementById("caixa-numeros");
        caixa.innerHTML = "";

        for (let i = 1; i <= 10; i++) {
            caixa.innerHTML += "<button class='botao-numero'>" + i + "</button>";
        }
    }
</script>

</body>
</html>
