<!DOCTYPE html>
<html>
<head>
    <title>Minha Rifa Online</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Rifa do Desapego</h1>
    <p>Seja bem-vindo! Escolha seu número.</p>
    
    <button onclick="criarNumeros()">Escolher números</button>

    <div id="caixa-numeros"></div>

    <div id="painel-cadastro" class="painel-cadastro">
        <h3 style="margin-top: 0;">📝 Cadastro da Reserva</h3>
        <p>Você selecionou o número <strong id="numero-selecionado" style="color: #08cf23;">X</strong>!</p>
        
        <div class="campo-formulario">
            <label for="nome-cliente">Seu Nome Completo:</label>
            <input type="text" id="nome-cliente" placeholder="Ex: João Silva">
        </div>

        <div class="campo-formulario">
            <label for="pix-cliente">Sua Chave Pix (para conferência):</label>
            <input type="text" id="pix-cliente" placeholder="Ex: Celular, CPF ou E-mail">
        </div>

        <button class="botao-confirmar" onclick="confirmarReserva()">Confirmar e Ver Pix</button>

        <div id="dados-pagamento" style="display: none; margin-top: 20px; border-top: 1px solid #4d4d57; padding-top: 20px;">
            <h3>ℹ️ Quase lá! Faça o Pagamento:</h3>
            <p>Escaneie o QR Code ou use o CPF abaixo:</p>
            
            <div class="qrcode-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=13468906927" alt="QR Code Pix">
            </div>

            <div class="chave-pix"><strong>CPF:</strong> 134.689.069-27</div>
            <p style="font-size: 13px; color: #a8a8b3; margin-top: 15px;">
                *Após pagar, envie o comprovante para o organizador.
            </p>
        </div>
    </div>

<script>
    let numeroEscolhidoGlobal = 0; // CORRIGIDO: Sem espaço no nome da variável

    function criarNumeros() { 
        let caixa = document.getElementById("caixa-numeros");
        caixa.innerHTML = "";

        for (let i = 1; i <= 50; i++) {
            caixa.innerHTML += "<button class='botao-numero' onclick='escolherNumero(" + i + ")'>" + i + "</button>";
        }
    }

    function escolherNumero(numero) {
        let botaoClicado = event.target;
        
        botaoClicado.style.backgroundColor = "#08cf23";
        botaoClicado.style.color = "white";
        
        numeroEscolhidoGlobal = numero; 
        
        document.getElementById("numero-selecionado").innerText = numero;
        document.getElementById("nome-cliente").value = "";
        document.getElementById("pix-cliente").value = "";
        document.getElementById("dados-pagamento").style.display = "none";
        
        document.getElementById("painel-cadastro").style.display = "block";
    }

    function confirmarReserva() {
        let nome = document.getElementById("nome-cliente").value;
        let pix = document.getElementById("pix-cliente").value;

        if (nome == "" || pix == "") {
            alert("Por favor, preencha o seu Nome e a sua Chave Pix para continuar!");
            return;
        }

        alert("Obrigado, " + nome + "! Seu número " + numeroEscolhidoGlobal + " foi pré-reservado. Agora faça o pagamento abaixo.");

        document.getElementById("dados-pagamento").style.display = "block";
    }
</script>

</body>
</html>
