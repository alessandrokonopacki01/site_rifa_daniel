<!DOCTYPE html>
<html>
<head>
    <title>Minha Rifa Online</title>
    <style>
        body {
            background-color: #202024;
            color: white;
            font-family: sans-serif;
        }

    
        button {
            background-color: #08cf23;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        
        .botao-numero {
            background-color: #202024;
            color: #08cf23;
            border: 2px solid #08cf23;
            padding: 10px;
            margin: 5px;
            width: 45px;
            height: 45px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Rifa do Desapego</h1>
    <p>Seja bem-vindo! Escolha seu número.</p>
    
    <button onclick="criarNumeros()">Escolher números</button>

    <div id="caixa-numeros"></div>

<script>
    function criarNumeros() { 
        let caixa = document.getElementById("caixa-numeros");
        caixa.innerHTML = "";

    
        for (let i = 1; i <= 50; i++) {
            caixa.innerHTML += "<button class='botao-numero' onclick='escolherNumero(" + i + ")'>" + i + "</button>";
        }
    }

    
    function escolherNumero(numero) {

        let botaoClicado = event.target;
        
        
        botaoClicado.style.backgroundColor = "#08cf23";
        botaoClicado.style.color = "white";
        
        
        alert("Você reservou o número: " + numero);
    }
</script>

</body>
</html>
